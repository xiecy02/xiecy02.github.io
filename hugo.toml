baseURL = 'https://xiecy02.github.io/'
languageCode = 'zh-cn'
title = 'Sakura Diaries'
theme = 'PaperMod'

[params]
    env = "production"

# --- 1. 资源配置 (注意这里和下面的层级是平级的) ---
[params.assets]
    favicon = "/favicon.ico"
    apple_touch_icon = "/apple-touch-icon.png"

# --- 2. 导航栏标签配置 ---
[params.label]
    text = "Sakura Diaries"
    icon = "/favicon.ico"
    iconHeight = 30

# --- 3. 个人资料模式 ---
[params.profileMode]
    enabled = true
    title = "Sakura Diaries"
    subtitle = "Study | Life"

[markup.goldmark.renderer]
    unsafe = true

[[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts"
    weight = 10
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags"
    weight = 20
[[menu.main]]
    identifier = "study"
    name = "Study"
    url = "/categories/study"
    weight = 30
[[menu.main]]
    identifier = "life"
    name = "Life"
    url = "/categories/life"
    weight = 40
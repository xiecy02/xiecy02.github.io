baseURL = 'https://xiecy02.github.io/'
languageCode = 'zh-cn'
title = 'Sakura Diaries'
theme = 'PaperMod'

[params]
    env = "production"
    
    # --- 新增：浏览器标签页图标 ---
[params.assets]
    favicon = "/favicon.ico"
    apple_touch_icon = "/apple-touch-icon.png"  # 专门给手机系统用的图标
    # --- 新增：左上角文字前的图标 ---
    [params.label]
        text = "Sakura Diaries"
        icon = "/favicon.ico"  # 图标放在文字开头
        iconHeight = 30       # 你可以根据图标大小微调高度

    [params.profileMode]
        enabled = true
        title = "Sakura Diaries"
        subtitle = "Study | Life"

[markup.goldmark.renderer]
    unsafe = true

[[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts"
    weight = 10
[[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags"
    weight = 20
[[menu.main]]
    identifier = "study"
    name = "Study"
    url = "/categories/study"
    weight = 30
[[menu.main]]
    identifier = "life"
    name = "Life"
    url = "/categories/life"
    weight = 40